<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowise — Audit Logs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-text">flowise</div><div class="logo-sub">Workflow System</div></div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar"></div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebar-user-name"></div>
          <div class="sidebar-user-role" id="sidebar-user-role"></div>
        </div>
        <button class="logout-btn" onclick="logout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <span class="topbar-title">Audit Logs</span>
      <div class="topbar-actions">
        <div style="position:relative" id="notif-wrap">
          <button class="notif-btn" id="notif-btn" onclick="toggleNotifPanel()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="notif-badge" id="notif-badge" style="display:none">0</span>
          </button>
        </div>
      </div>
    </div>
    <div class="page-body">
      <div class="card">
        <div class="card-header">
          <div><div class="card-title">System Audit Trail</div><div class="card-subtitle">All workflow actions and approvals</div></div>
        </div>
        <div class="filter-bar">
          <select class="form-control" style="width:160px" id="action-filter" onchange="loadLogs()">
            <option value="">All actions</option>
            <option value="submitted">Submitted</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
        <div id="logs-content"><div class="loading-overlay"><span class="spinner"></span></div></div>
      </div>
    </div>
  </div>
</div>

<script src="js/utils.js"></script>
<script>
const user = requireAuth(['developer', 'admin']);
if (user) { initSidebar('audit_logs'); loadNotifCount(); loadLogs(); }

async function loadLogs() {
  // Fetch all executions to derive logs — for dev role we use execution list
  const execs = await apiFetch('/execution/list') || [];
  const actionFilter = document.getElementById('action-filter').value;

  // Gather logs from all executions
  const allLogs = [];
  await Promise.all(execs.slice(0, 30).map(async (ex) => {
    try {
      const logs = await apiFetch(`/execution/logs/${ex.id}`) || [];
      logs.forEach(l => allLogs.push({ ...l, execution_title: ex.title, execution_id: ex.id }));
    } catch {}
  }));

  allLogs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  const filtered = actionFilter ? allLogs.filter(l => l.action === actionFilter) : allLogs;

  const container = document.getElementById('logs-content');
  if (!filtered.length) {
    container.innerHTML = '<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><div class="empty-state-title">No log entries</div><div class="empty-state-sub">Workflow actions will appear here</div></div>';
    return;
  }
  container.innerHTML = `<div class="table-wrap"><table>
    <thead><tr><th>Action</th><th>Step</th><th>Execution</th><th>Performed By</th><th>Note</th><th>Timestamp</th></tr></thead>
    <tbody>${filtered.map(l => `<tr>
      <td><span class="badge badge-${l.action==='approved'?'accepted':l.action==='rejected'?'rejected':l.action==='submitted'?'active':'pending'}">${l.action}</span></td>
      <td class="text-muted">${l.step_name || '—'}</td>
      <td>
        <a href="execution_detail.html?id=${l.execution_id}" style="color:inherit;text-decoration:underline;text-decoration-color:#ccc">
          ${l.execution_title || '#' + l.execution_id}
        </a>
      </td>
      <td>${l.full_name || '—'}</td>
      <td class="text-muted" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.note || '—'}</td>
      <td class="text-muted text-mono" style="font-size:12px">${fmtDateTime(l.created_at)}</td>
    </tr>`).join('')}</tbody></table></div>`;
}
</script>
</body>
</html>
